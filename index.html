<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Project Tracker for Equitas Health</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🦆 Equitas Health Project Tracker</h1>
            <p>Safety & Web Development Projects</p>
        </header>

        <div class="stats-dashboard">
            <div class="stat-card">
                <div class="stat-number" id="total-projects">0</div>
                <div class="stat-label">Total Projects</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completed-projects">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="ongoing-projects">0</div>
                <div class="stat-label">Ongoing</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="avg-progress">0%</div>
                <div class="stat-label">Avg Progress</div>
            </div>
        </div>

        <div class="controls">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search projects...">
            </div>
            <div class="filters">
                <select id="status-filter">
                    <option value="">All Status</option>
                    <option value="Completed">Completed</option>
                    <option value="Ongoing">Ongoing</option>
                    <option value="On Hold">On Hold</option>
                    <option value="Not Started">Not Started</option>
                </select>
                <select id="type-filter">
                    <option value="">All Types</option>
                    <option value="Safety">Safety</option>
                    <option value="Web Development">Web Development</option>
                    <option value="Map Design">Map Design</option>
                </select>
            </div>
            <div class="view-controls">
                <button id="view-toggle">📋 Table View</button>
                <button id="add-project" onclick="addProject()">➕ Add Project</button>
            </div>
        </div>

        <div id="cards-container">
            <div id="projects-container" class="projects-grid"></div>
        </div>

        <div id="table-container" style="display: none;">
            <div class="table-wrapper">
                <table class="projects-table">
                    <thead>
                        <tr>
                            <th>Project Name</th>
                            <th>Status</th>
                            <th>Priority</th>
                            <th>Type</th>
                            <th>Start Date</th>
                            <th>Progress</th>
                            <th>Notes</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
